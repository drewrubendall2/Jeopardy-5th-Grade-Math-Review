<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>End of Module Review Jeopardy</title>
  <style>
    :root{
      --bg1:#1e1b4b;
      --bg2:#312e81;
      --bg3:#4338ca;
      --panel:rgba(255,255,255,0.14);
      --panel-dark:rgba(255,255,255,0.10);
      --white:#ffffff;
      --soft:#eef2ff;
      --gold:#ffd166;
      --blue:#60a5fa;
      --pink:#f472b6;
      --green:#22c55e;
      --red:#ef4444;
      --shadow:0 14px 40px rgba(0,0,0,0.28);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      color:var(--white);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.12) 0, transparent 18%),
        radial-gradient(circle at top right, rgba(255,255,255,0.10) 0, transparent 14%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    }

    .container{
      max-width:1500px;
      margin:0 auto;
      padding:20px 24px 30px;
    }

    .header{
      text-align:center;
      margin-bottom:18px;
    }

    .header h1{
      margin:0;
      font-size:clamp(2.3rem, 4vw, 4rem);
      line-height:1.1;
      font-weight:900;
      letter-spacing:.3px;
      text-shadow:0 4px 10px rgba(0,0,0,.22);
    }

    .header p{
      margin:10px 0 0;
      font-size:1.35rem;
      color:#e0e7ff;
    }

    .top-bar{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:18px;
      margin-bottom:22px;
    }

    .panel{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.18);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      padding:18px;
    }

    .panel h3{
      margin:0 0 16px 0;
      font-size:2rem;
      font-weight:800;
    }

    .team-grid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:14px;
    }

    .team-card{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      padding:14px;
      text-align:center;
    }

    .team-card input{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:10px 12px;
      text-align:center;
      font-size:1rem;
      margin-bottom:12px;
      background:#ffffff;
      color:#1f2937;
      font-weight:700;
    }

    .score{
      font-size:2.1rem;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
      text-shadow:0 1px 6px rgba(0,0,0,.22);
    }

    .score-controls{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
      font-size:.96rem;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .btn-good{ background:var(--green); color:white; }
    .btn-bad{ background:var(--red); color:white; }
    .btn-primary{ background:#4f46e5; color:white; }
    .btn-light{ background:#e5e7eb; color:#111827; }
    .btn-gold{ background:var(--gold); color:#1f2937; }
    .btn-pink{ background:var(--pink); color:white; }

    .controls p{
      margin:0;
      font-size:1.08rem;
      line-height:1.6;
      color:#f8fafc;
    }

    .controls-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:12px;
    }

    .category{
      border-radius:20px;
      overflow:hidden;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:var(--shadow);
    }

    .category-title{
      min-height:92px;
      padding:16px 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      font-size:1rem;
      line-height:1.2;
      text-transform:uppercase;
      letter-spacing:.4px;
      color:white;
      background:linear-gradient(180deg, #4f46e5, #3730a3);
    }

    .tile{
      width:100%;
      min-height:94px;
      border:none;
      border-top:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, #2563eb, #1d4ed8);
      color:var(--gold);
      font-size:2rem;
      font-weight:900;
      text-shadow:0 2px 6px rgba(0,0,0,.25);
      cursor:pointer;
    }

    .tile:hover{
      filter:brightness(1.08);
    }

    .tile.used{
      background:#334155;
      color:#94a3b8;
      cursor:not-allowed;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(15, 23, 42, 0.72);
      z-index:999;
    }

    .modal.show{
      display:flex;
    }

    .modal-card{
      width:min(920px, 100%);
      max-height:90vh;
      overflow:auto;
      background:white;
      color:#111827;
      border-radius:28px;
      box-shadow:0 24px 60px rgba(0,0,0,.36);
    }

    .modal-header{
      padding:20px 24px;
      background:linear-gradient(135deg, #4f46e5, #7c3aed);
      color:white;
    }

    .modal-header h2{
      margin:0;
      font-size:1.55rem;
      font-weight:900;
    }

    .modal-body{
      padding:24px;
    }

    .question-text{
      font-size:1.45rem;
      line-height:1.55;
      font-weight:800;
      margin-bottom:20px;
    }

    .answer-box{
      display:none;
      background:#f5f3ff;
      border:2px solid #ddd6fe;
      border-radius:18px;
      padding:18px;
      margin-bottom:20px;
    }

    .answer-box.show{
      display:block;
    }

    .answer-box h3{
      margin:0 0 8px 0;
      color:#5b21b6;
      font-size:1.1rem;
    }

    .answer-box p{
      margin:0;
      font-size:1.08rem;
      line-height:1.5;
      font-weight:600;
    }

    .modal-actions{
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      align-items:center;
    }

    .team-award{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .team-award span{
      font-weight:800;
      color:#374151;
      margin-right:4px;
    }

    .review-list{
      display:grid;
      gap:16px;
    }

    .review-category{
      border:2px solid #ddd6fe;
      border-radius:18px;
      overflow:hidden;
      background:#faf5ff;
    }

    .review-category h3{
      margin:0;
      padding:14px 16px;
      background:linear-gradient(135deg, #6366f1, #8b5cf6);
      color:white;
      font-size:1.05rem;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .review-item{
      padding:14px 16px;
      border-top:1px solid #e9d5ff;
    }

    .review-item strong{
      display:block;
      margin-bottom:4px;
      color:#4c1d95;
    }

    .review-item p{
      margin:0;
      color:#1f2937;
      line-height:1.5;
      font-weight:600;
    }

    @media (max-width:1300px){
      .team-grid{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width:1100px){
      .top-bar{
        grid-template-columns:1fr;
      }
      .board{
        grid-template-columns:repeat(2, 1fr);
      }
    }

    @media (max-width:760px){
      .team-grid{
        grid-template-columns:repeat(2, 1fr);
      }
      .board{
        grid-template-columns:1fr;
      }
      .question-text{
        font-size:1.2rem;
      }
    }

    @media (max-width:520px){
      .team-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>End of Module Review Jeopardy</h1>
      <p>5th Grade Math Review Game</p>
    </div>

    <div class="top-bar">
      <div class="panel">
        <h3>Team Scoreboard</h3>
        <div class="team-grid" id="teamGrid"></div>
      </div>

      <div class="panel controls">
        <h3>Game Controls</h3>
        <p>
          Work together in teams to solve these math problems. Once you have your answer, buzz in! Teams are only allowed one answer per question.
        </p>
        <div class="controls-row">
          <button class="btn-gold" onclick="resetBoard()">Reset Board</button>
          <button class="btn-light" onclick="resetScores()">Reset Scores</button>
          <button class="btn-pink" onclick="showAllQuestions()">Show All Questions</button>
        </div>
      </div>
    </div>

    <div class="board" id="board"></div>
  </div>

  <div class="modal" id="questionModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Question</h2>
      </div>
      <div class="modal-body">
        <div class="question-text" id="modalQuestion"></div>

        <div class="answer-box" id="answerBox">
          <h3>Answer</h3>
          <p id="modalAnswer"></p>
        </div>

        <div class="modal-actions">
          <div class="controls-row">
            <button class="btn-primary" id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
            <button class="btn-light" onclick="closeModal()">Close</button>
          </div>

          <div class="team-award">
            <span>Award/Subtract:</span>
            <button class="btn-good" onclick="changeScore(0, currentQuestion.value)">Team 1 +</button>
            <button class="btn-good" onclick="changeScore(1, currentQuestion.value)">Team 2 +</button>
            <button class="btn-good" onclick="changeScore(2, currentQuestion.value)">Team 3 +</button>
            <button class="btn-good" onclick="changeScore(3, currentQuestion.value)">Team 4 +</button>
            <button class="btn-good" onclick="changeScore(4, currentQuestion.value)">Team 5 +</button>
            <button class="btn-bad" onclick="changeScore(0, -currentQuestion.value)">Team 1 -</button>
            <button class="btn-bad" onclick="changeScore(1, -currentQuestion.value)">Team 2 -</button>
            <button class="btn-bad" onclick="changeScore(2, -currentQuestion.value)">Team 3 -</button>
            <button class="btn-bad" onclick="changeScore(3, -currentQuestion.value)">Team 4 -</button>
            <button class="btn-bad" onclick="changeScore(4, -currentQuestion.value)">Team 5 -</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="allQuestionsModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2>All Review Questions</h2>
      </div>
      <div class="modal-body">
        <div class="review-list" id="reviewList"></div>
        <div class="controls-row" style="margin-top:20px;">
          <button class="btn-light" onclick="closeAllQuestions()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const teams = [
      { name: "Team 1", score: 0 },
      { name: "Team 2", score: 0 },
      { name: "Team 3", score: 0 },
      { name: "Team 4", score: 0 },
      { name: "Team 5", score: 0 }
    ];

    const categories = [
      {
        title: "Multiply & Divide Fractions",
        questions: [
          { value: 100, q: "Compute: 1/3 × 1/5", a: "1/15" },
          { value: 200, q: "Compute: 3/4 × 2/5", a: "6/20, which simplifies to 3/10" },
          { value: 300, q: "Compute: 1/4 ÷ 5", a: "1/20" },
          { value: 400, q: "Compute: 8 ÷ 1/3", a: "24" }
        ]
      },
      {
        title: "Write Equivalent Expressions",
        questions: [
          { value: 100, q: "Write an expression for: One-half the sum of one-half and one-third.", a: "1/2 × (1/2 + 1/3)" },
          { value: 200, q: "Write an expression for: Two and one-third times the sum of nine and twelve.", a: "2 1/3 × (9 + 12)" },
          { value: 300, q: "Write an expression for: Twelve divided by the difference between 1 1/2 and 3/4.", a: "12 ÷ (1 1/2 - 3/4)" },
          { value: 400, q: "Compute: 1.2 ÷ 0.3", a: "4" }
        ]
      },
      {
        title: "Guard Duty Time Problems",
        questions: [
          { value: 100, q: "Seven knights share 24 hours of guard duty equally. How many hours does each knight work? Round to the nearest tenth.", a: "24 ÷ 7 = about 3.4 hours" },
          { value: 200, q: "If the guard works for 3.4 hours, convert it to hours and minutes.", a: "3 hours 24 minutes" },
          { value: 300, q: "Take 3 hours and 24 minutes and convert it to just minutes.", a: "204 minutes" },
          { value: 400, q: "Explain why 0.4 of an hour is 24 minutes.", a: "Because 0.4 × 60 = 24, so 0.4 hour = 24 minutes." }
        ]
      },
      {
        title: "Reasoning With Division",
        questions: [
          { value: 100, q: "Solve: 7 ÷ 2", a: "3 1/2" },
          { value: 200, q: "Solve: 7 ÷ 1/2", a: "14" },
          { value: 300, q: "Solve: 12 ÷ 1/6", a: "72" },
          { value: 400, q: "A student says multiplication always makes a number bigger. Give a counterexample.", a: "Example: 1/2 × 1/3 = 1/6. This shows multiplication can make a number smaller." }
        ]
      },
      {
        title: "Jill's Honey Problems",
        questions: [
          { value: 100, q: "Jill collected 19 gallons of honey and distributed it equally between 7 jars. How much honey is in each jar?", a: "19 ÷ 7 = 19/7 = 2 5/7 gallons per jar" },
          { value: 200, q: "Jill has 19/7 jars of honey. She used 3/5 of a jar of honey for baking. How much honey did she use?", a: "3/5 × 19/7 = 57/35 = 1 22/35 jars of honey" },
          { value: 300, q: "Jill's mom used 1/4 gallon of honey to bake 3 loaves of bread. How much honey was used for 1 loaf?", a: "1/4 ÷ 3 = 1/12 gallon per loaf" },
          { value: 400, q: "A container held 3/4 gallon of honey. Half of this amount was used to sweeten tea. How much honey was used, in cups?", a: "1/2 × 3/4 = 3/8 gallon. Since 1 gallon = 16 cups, 3/8 × 16 = 6 cups." }
        ]
      }
    ];

    const boardEl = document.getElementById("board");
    const teamGridEl = document.getElementById("teamGrid");
    const modal = document.getElementById("questionModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalAnswer = document.getElementById("modalAnswer");
    const answerBox = document.getElementById("answerBox");
    const revealBtn = document.getElementById("revealBtn");
    const allQuestionsModal = document.getElementById("allQuestionsModal");
    const reviewList = document.getElementById("reviewList");

    let currentQuestion = null;

    function renderTeams(){
      teamGridEl.innerHTML = "";
      teams.forEach((team, index) => {
        const card = document.createElement("div");
        card.className = "team-card";
        card.innerHTML = `
          <input value="${team.name}" onchange="updateTeamName(${index}, this.value)" />
          <div class="score">${team.score}</div>
          <div class="score-controls">
            <button class="btn-good" onclick="changeScore(${index}, 100)">+100</button>
            <button class="btn-bad" onclick="changeScore(${index}, -100)">-100</button>
          </div>
        `;
        teamGridEl.appendChild(card);
      });
    }

    function renderBoard(){
      boardEl.innerHTML = "";
      categories.forEach((category, catIndex) => {
        const col = document.createElement("div");
        col.className = "category";

        const title = document.createElement("div");
        title.className = "category-title";
        title.textContent = category.title;
        col.appendChild(title);

        category.questions.forEach((question, qIndex) => {
          const btn = document.createElement("button");
          btn.className = "tile" + (question.used ? " used" : "");
          btn.textContent = question.used ? "" : `$${question.value}`;
          btn.disabled = !!question.used;
          btn.onclick = () => openQuestion(catIndex, qIndex);
          col.appendChild(btn);
        });

        boardEl.appendChild(col);
      });
    }

    function updateTeamName(index, value){
      teams[index].name = value.trim() || `Team ${index + 1}`;
    }

    function openQuestion(catIndex, qIndex){
      const question = categories[catIndex].questions[qIndex];
      currentQuestion = { ...question, catIndex, qIndex };

      modalTitle.textContent = `${categories[catIndex].title} - $${question.value}`;
      modalQuestion.textContent = question.q;
      modalAnswer.textContent = question.a;
      answerBox.classList.remove("show");
      revealBtn.style.display = "inline-block";
      modal.classList.add("show");
    }

    function revealAnswer(){
      answerBox.classList.add("show");
      revealBtn.style.display = "none";

      if(currentQuestion){
        categories[currentQuestion.catIndex].questions[currentQuestion.qIndex].used = true;
        renderBoard();
      }
    }

    function closeModal(){
      modal.classList.remove("show");
      currentQuestion = null;
    }

    function changeScore(teamIndex, amount){
      teams[teamIndex].score += amount;
      renderTeams();
    }

    function resetScores(){
      teams.forEach(team => team.score = 0);
      renderTeams();
    }

    function resetBoard(){
      categories.forEach(category => {
        category.questions.forEach(question => {
          question.used = false;
        });
      });
      renderBoard();
      closeModal();
    }

    function showAllQuestions(){
      reviewList.innerHTML = "";

      categories.forEach(category => {
        const section = document.createElement("div");
        section.className = "review-category";

        const heading = document.createElement("h3");
        heading.textContent = category.title;
        section.appendChild(heading);

        category.questions.forEach(question => {
          const item = document.createElement("div");
          item.className = "review-item";
          item.innerHTML = `
            <strong>$${question.value}</strong>
            <p><b>Question:</b> ${question.q}</p>
            <p style="margin-top:6px;"><b>Answer:</b> ${question.a}</p>
          `;
          section.appendChild(item);
        });

        reviewList.appendChild(section);
      });

      allQuestionsModal.classList.add("show");
    }

    function closeAllQuestions(){
      allQuestionsModal.classList.remove("show");
    }

    window.onclick = function(event){
      if(event.target === modal){
        closeModal();
      }
      if(event.target === allQuestionsModal){
        closeAllQuestions();
      }
    };

    renderTeams();
    renderBoard();
  </script>
</body>
</html>
